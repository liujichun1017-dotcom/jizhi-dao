<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="肌知道 — 医美治疗项目介绍与术后护理知识库" />
  <title>肌知道 · 医美术后护理知识库</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ======= HEADER ======= -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-zh">肌知道</span>
        <span class="logo-sub">医美护理知识库</span>
      </div>
      <a href="admin/" class="admin-link" title="后台管理">⚙</a>
    </div>
  </header>

  <!-- ======= HERO ======= -->
  <section class="hero">
    <div class="hero-inner">
      <h1>术后护理，从这里开始</h1>
      <p>涵盖 11 个医美治疗项目的术后注意事项<br>清晰、专业、随时查阅</p>
    </div>
  </section>

  <!-- ======= FILTER ======= -->
  <section class="filter-bar">
    <div class="filter-inner" id="filterBar">
      <!-- 由 JS 动态生成 -->
    </div>
  </section>

  <!-- ======= CARDS GRID ======= -->
  <main class="main-content">
    <div class="cards-grid" id="cardsGrid">
      <!-- 由 JS 动态生成 -->
    </div>

    <!-- 共同注意事项 -->
    <div class="common-note-box" id="commonNoteBox">
      <div class="common-note-icon">📋</div>
      <h3>共同注意事项</h3>
      <ul id="commonNoteList"></ul>
    </div>
  </main>

  <!-- ======= DETAIL MODAL ======= -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="关闭">✕</button>

      <div class="modal-header">
        <span class="modal-emoji" id="modalEmoji"></span>
        <div>
          <h2 class="modal-title" id="modalTitle"></h2>
          <p class="modal-name-en" id="modalNameEn"></p>
        </div>
      </div>

      <!-- 设备标签 -->
      <div class="modal-devices" id="modalDevices"></div>

      <!-- 项目介绍 -->
      <section class="modal-section">
        <h3 class="section-label">项目介绍</h3>
        <p class="modal-intro" id="modalIntro"></p>
      </section>

      <!-- 术后注意事项 -->
      <section class="modal-section">
        <h3 class="section-label aftercare-label">术后注意事项</h3>
        <ol class="aftercare-list" id="modalAftercare"></ol>
      </section>

      <!-- 共同注意 -->
      <div class="modal-common">
        <span class="common-tag">通用提醒</span>
        <ul id="modalCommonList"></ul>
      </div>
    </div>
  </div>

  <!-- ======= FOOTER ======= -->
  <footer class="site-footer">
    <p>肌知道 · 医美护理知识库 · 仅供参考，具体请遵医嘱</p>
  </footer>

  <script src="data/treatments.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
